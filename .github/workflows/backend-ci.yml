name: Backend CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.mod
      - name: gofmt check
        run: |
          test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: docker build
        run: docker build .
