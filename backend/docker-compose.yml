services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trip
      POSTGRES_PASSWORD: trip
      POSTGRES_DB: trip
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trip -d trip"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://trip:trip@postgres:5432/trip?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    volumes:
      - ./api/openapi.yaml:/openapi/openapi.yaml:ro
    ports:
      - "8081:8080"

  migrate:
    build: .
    env_file: .env.example
    entrypoint: ["trip-migrate", "up"]
    environment:
      DATABASE_URL: postgres://trip:trip@postgres:5432/trip?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
