services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trip
      POSTGRES_PASSWORD: trip
      POSTGRES_DB: trip
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trip -d trip"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://trip:trip@postgres:5432/trip?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
