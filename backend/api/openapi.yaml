openapi: 3.1.0
info:
  title: Trip API
  version: 0.2.0
  summary: API для iOS-приложения Trip.
  description: >
    Backend хранит поездки, дни маршрута, план, расходы, балансы, пользователей,
    сессии и агрегированную модель для виджета. Все успешные ответы завернуты
    в объект `data`, списки дополнительно могут содержать `meta.next_cursor`.
servers:
  - url: http://localhost:8080
    description: Локальный backend из Docker Compose
tags:
  - name: Health
    description: Проверка доступности процесса и базы данных.
  - name: Auth
    description: Регистрация, вход, обновление сессии и Яндекс ID.
  - name: Trips
    description: Каталог поездок и основные свойства поездки.
  - name: Itinerary
    description: Дни маршрута и элементы плана.
  - name: Expenses
    description: Расходы, доли участников и балансы.
  - name: Widgets
    description: Агрегированные данные для WidgetKit.
  - name: Migration
    description: Импорт локальных данных из iOS UserDefaults.
paths:
  /health/live:
    get:
      operationId: getLiveHealth
      tags: [Health]
      summary: Проверить, что API-процесс запущен.
      description: Используется для базовой проверки контейнера или процесса. Не проверяет PostgreSQL.
      responses:
        "200":
          description: API отвечает.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
  /health/ready:
    get:
      operationId: getReadyHealth
      tags: [Health]
      summary: Проверить готовность API и PostgreSQL.
      description: Возвращает `ready`, если backend может подключиться к базе данных.
      responses:
        "200":
          description: API и база готовы.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Зарегистрировать локального пользователя.
      description: Нужен для локальной разработки. Для production-входа предпочтителен Яндекс ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Пользователь создан, сессия выдана.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Войти по email и паролю.
      description: Возвращает access token и refresh token для локального пользователя.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Вход выполнен.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/refresh:
    post:
      operationId: refresh
      tags: [Auth]
      summary: Обновить access token.
      description: Старый refresh token отзывается, backend выдает новую пару access/refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Сессия обновлена.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Выйти из текущей refresh-сессии.
      description: Отзывает refresh token. Access token живет до истечения короткого TTL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refresh token отозван.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
  /api/v1/auth/yandex:
    post:
      operationId: loginWithYandex
      tags: [Auth]
      summary: Войти через Яндекс ID.
      description: >
        iOS получает OAuth token через Yandex LoginSDK и отправляет его backend.
        Backend проверяет токен через Яндекс, создает или находит пользователя,
        связывает Яндекс-аккаунт и возвращает backend tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YandexAuthRequest"
      responses:
        "200":
          description: Яндекс-токен принят, backend-сессия создана.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Получить текущего пользователя.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Текущий пользователь.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateMe
      tags: [Auth]
      summary: Обновить профиль текущего пользователя.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequest"
      responses:
        "200":
          description: Профиль обновлен.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/trips:
    get:
      operationId: listTrips
      tags: [Trips]
      summary: Получить список поездок.
      description: Возвращает только активные поездки, где `deleted_at IS NULL`.
      responses:
        "200":
          description: Список поездок.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripSummaryListEnvelope"
    post:
      operationId: createTrip
      tags: [Trips]
      summary: Создать поездку.
      description: Создает поездку, города, гостевых участников и дни маршрута.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripRequest"
      responses:
        "201":
          description: Поездка создана.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getTrip
      tags: [Trips]
      summary: Получить поездку.
      description: Возвращает основные поля поездки, города и участников.
      responses:
        "200":
          description: Поездка найдена.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripEnvelope"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateTrip
      tags: [Trips]
      summary: Обновить поездку.
      description: Обновляет название, даты и timezone. Увеличивает `version`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripRequest"
      responses:
        "200":
          description: Поездка обновлена.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteTrip
      tags: [Trips]
      summary: Мягко удалить поездку.
      description: >
        Поездка не удаляется физически из базы. Backend выставляет `deleted_at`,
        обновляет `updated_at` и увеличивает `version`. Это позволяет позже
        добавить восстановление поездки.
      responses:
        "200":
          description: Поездка помечена удаленной.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/days:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: listTripDays
      tags: [Itinerary]
      summary: Получить дни маршрута.
      description: Возвращает дни поездки в порядке `sort_order`.
      responses:
        "200":
          description: Дни маршрута.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDayListEnvelope"
  /api/v1/trips/{trip_id}/plan-items:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: listPlanItems
      tags: [Itinerary]
      summary: Получить элементы плана.
      description: Возвращает не удаленные элементы плана поездки.
      responses:
        "200":
          description: Элементы плана.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItemListEnvelope"
    post:
      operationId: createPlanItem
      tags: [Itinerary]
      summary: Создать элемент плана.
      description: Добавляет активность, переезд, прогулку, еду или другой элемент в конкретный день.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanItemRequest"
      responses:
        "201":
          description: Элемент плана создан.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItemEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/plan-items/{item_id}:
    parameters:
      - $ref: "#/components/parameters/TripID"
      - $ref: "#/components/parameters/ItemID"
    patch:
      operationId: updatePlanItem
      tags: [Itinerary]
      summary: Обновить элемент плана.
      description: Частично обновляет поля элемента плана и увеличивает `version`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanItemRequest"
      responses:
        "200":
          description: Элемент плана обновлен.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanItemEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deletePlanItem
      tags: [Itinerary]
      summary: Мягко удалить элемент плана.
      description: Выставляет `deleted_at`; запись остается в базе.
      responses:
        "200":
          description: Элемент плана помечен удаленным.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/schedule-progress:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getScheduleProgress
      tags: [Itinerary]
      summary: Получить заполненность расписания.
      description: Считает занятые минуты по exact-time активностям и объединяет пересекающиеся интервалы.
      responses:
        "200":
          description: Заполненность расписания по поездке и дням.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleProgressEnvelope"
  /api/v1/trips/{trip_id}/expenses:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: listExpenses
      tags: [Expenses]
      summary: Получить расходы.
      description: Возвращает не удаленные расходы с долями участников.
      responses:
        "200":
          description: Расходы.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListEnvelope"
    post:
      operationId: createExpense
      tags: [Expenses]
      summary: Создать расход.
      description: >
        Создает расход и доли участников. Если `shares` не переданы, backend
        делит сумму поровну между всеми `trip_parties`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseRequest"
      responses:
        "201":
          description: Расход создан.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseEnvelope"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/expenses/{expense_id}:
    parameters:
      - $ref: "#/components/parameters/TripID"
      - $ref: "#/components/parameters/ExpenseID"
    patch:
      operationId: updateExpense
      tags: [Expenses]
      summary: Обновить расход.
      description: Частично обновляет расход. Если переданы `shares`, они заменяют старые доли.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseRequest"
      responses:
        "200":
          description: Расход обновлен.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteExpense
      tags: [Expenses]
      summary: Мягко удалить расход.
      description: Выставляет `deleted_at`; запись остается в базе для будущего восстановления или аудита.
      responses:
        "200":
          description: Расход помечен удаленным.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusEnvelope"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/balances:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getBalances
      tags: [Expenses]
      summary: Получить балансы.
      description: Считает баланс каждого участника и упрощенные переводы отдельно по каждой валюте.
      responses:
        "200":
          description: Балансы и переводы.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalancesEnvelope"
  /api/v1/trips/{trip_id}/widget:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getTripWidget
      tags: [Widgets]
      summary: Получить данные для виджета.
      description: Агрегированная модель, которую iOS может сохранить в App Group cache для WidgetKit.
      responses:
        "200":
          description: Данные для виджета.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetEnvelope"
  /api/v1/import/local-data:
    post:
      operationId: importLocalData
      tags: [Migration]
      summary: Импортировать локальные данные iOS.
      description: Импортирует массив поездок из локального хранилища iOS. Сейчас поддерживает базовую структуру поездки.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportLocalDataRequest"
      responses:
        "201":
          description: Данные импортированы.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportLocalDataEnvelope"
        "400":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TripID:
      name: trip_id
      in: path
      required: true
      description: UUID поездки.
      schema:
        type: string
        format: uuid
    ItemID:
      name: item_id
      in: path
      required: true
      description: UUID элемента плана.
      schema:
        type: string
        format: uuid
    ExpenseID:
      name: expense_id
      in: path
      required: true
      description: UUID расхода.
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Ошибка API.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    StatusEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Status"
    Status:
      type: object
      required: [status]
      properties:
        status:
          type: string
          examples: [ok, ready, deleted]
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, VERSION_CONFLICT, INVALID_CREDENTIALS, TOKEN_EXPIRED, TRIP_DATE_CONFLICT, MEMBER_ALREADY_EXISTS, EXPENSE_SHARES_MISMATCH, INTERNAL_ERROR, NOT_IMPLEMENTED]
        message:
          type: string
        request_id:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
        reason:
          type: string
    RegisterRequest:
      type: object
      required: [email, display_name, password]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        password:
          type: string
          minLength: 8
        device_id:
          type: string
        device_name:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        device_id:
          type: string
        device_name:
          type: string
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    YandexAuthRequest:
      type: object
      required: [oauth_token]
      properties:
        oauth_token:
          type: string
          description: OAuth token, полученный iOS-приложением через Yandex LoginSDK.
        device_id:
          type: string
        device_name:
          type: string
    UpdateMeRequest:
      type: object
      required: [display_name]
      properties:
        display_name:
          type: string
    AuthEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/AuthResponse"
    AuthResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_at, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          examples: [Bearer]
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
    UserEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required: [id, email, display_name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          $ref: "#/components/schemas/SystemRole"
        avatar_url:
          type: [string, "null"]
          format: uri
    SystemRole:
      type: string
      description: Системная роль пользователя.
      enum: [admin, user]
    TripSummaryListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TripSummary"
        meta:
          $ref: "#/components/schemas/ListMeta"
    TripEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Trip"
    TripSummary:
      type: object
      required: [id, title, start_date, end_date, cities, member_count, schedule_occupancy_percent, expense_totals_by_currency, updated_at, version]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        cities:
          type: array
          items:
            $ref: "#/components/schemas/TripCity"
        member_count:
          type: integer
        schedule_occupancy_percent:
          type: integer
        expense_totals_by_currency:
          type: object
          additionalProperties:
            type: integer
            format: int64
        approximate_total_rub:
          type: [integer, "null"]
          format: int64
        nearest_activity:
          anyOf:
            - $ref: "#/components/schemas/NearestActivity"
            - type: "null"
        updated_at:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    Trip:
      type: object
      required: [id, title, start_date, end_date, cities, parties, version, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        timezone:
          type: [string, "null"]
        cities:
          type: array
          items:
            $ref: "#/components/schemas/TripCity"
        parties:
          type: array
          items:
            $ref: "#/components/schemas/TripParty"
        version:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TripCity:
      type: object
      required: [id, name, sort_order]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sort_order:
          type: integer
    TripParty:
      type: object
      required: [id, display_name]
      properties:
        id:
