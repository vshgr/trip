openapi: 3.1.0
info:
  title: Trip API
  version: 0.1.0
  summary: Backend API for the Trip iOS application.
servers:
  - url: http://localhost:8080
paths:
  /health/live:
    get:
      operationId: getLiveHealth
      tags: [Health]
      responses:
        "200":
          description: API process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /health/ready:
    get:
      operationId: getReadyHealth
      tags: [Health]
      responses:
        "200":
          description: API is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/auth/refresh:
    post:
      operationId: refresh
      tags: [Auth]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/me:
    get:
      operationId: getMe
      tags: [Auth]
      responses:
        "501":
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateMe
      tags: [Auth]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips:
    get:
      operationId: listTrips
      tags: [Trips]
      responses:
        "501":
          $ref: "#/components/responses/Error"
    post:
      operationId: createTrip
      tags: [Trips]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getTrip
      tags: [Trips]
      responses:
        "501":
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateTrip
      tags: [Trips]
      responses:
        "501":
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteTrip
      tags: [Trips]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/days:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: listTripDays
      tags: [Itinerary]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/plan-items:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: listPlanItems
      tags: [Itinerary]
      responses:
        "501":
          $ref: "#/components/responses/Error"
    post:
      operationId: createPlanItem
      tags: [Itinerary]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/schedule-progress:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getScheduleProgress
      tags: [Itinerary]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/expenses:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: listExpenses
      tags: [Expenses]
      responses:
        "501":
          $ref: "#/components/responses/Error"
    post:
      operationId: createExpense
      tags: [Expenses]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/balances:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getBalances
      tags: [Expenses]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/trips/{trip_id}/widget:
    parameters:
      - $ref: "#/components/parameters/TripID"
    get:
      operationId: getTripWidget
      tags: [Widgets]
      responses:
        "501":
          $ref: "#/components/responses/Error"
  /api/v1/import/local-data:
    post:
      operationId: importLocalData
      tags: [Migration]
      responses:
        "501":
          $ref: "#/components/responses/Error"
components:
  parameters:
    TripID:
      name: trip_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    StatusResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              examples: [ok, ready]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [code, message, request_id]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - VERSION_CONFLICT
            - INVALID_CREDENTIALS
            - TOKEN_EXPIRED
            - TRIP_DATE_CONFLICT
            - MEMBER_ALREADY_EXISTS
            - EXPENSE_SHARES_MISMATCH
            - INTERNAL_ERROR
            - NOT_IMPLEMENTED
        message:
          type: string
        request_id:
          type: string
        details:
          type: array
          items:
            type: object
            required: [field, reason]
            properties:
              field:
                type: string
              reason:
                type: string
